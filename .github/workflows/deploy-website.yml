name: Deploy Technoladders Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Docker Hub (for push)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build and push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: xrilictechnologies/technoladders-website:latest

      # 4. Deploy to VPS via SSH
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Login to Docker Hub on server
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            # Create app directory
            mkdir -p /home/deploy/apps/technoladders-website

            # Create docker-compose.yml
            cat > /home/deploy/apps/technoladders-website/docker-compose.yml << 'EOF'
            services:
              technoladders-website:
                image: xrilictechnologies/technoladders-website:latest
                container_name: technoladders-website
                restart: unless-stopped
                ports:
                  - "5025:80"
                networks:
                  - proxy-network-prod

            networks:
              proxy-network-prod:
                external: true
            EOF

            # Navigate to app
            cd /home/deploy/apps/technoladders-website

            # Pull latest image
            docker pull xrilictechnologies/technoladders-website:latest

            # Restart container cleanly
            docker compose down
            docker compose up -d --force-recreate

            echo "✅ Deployment completed successfully!"