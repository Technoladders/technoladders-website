name: Deploy Technoladders Website

on:
  push:
    branches:
      - main  # Trigger only when you push to the main branch
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Website Docker image
        uses: docker/build-push-action@v4
        with:
          context: . # Build from the root of this repo
          push: true
          tags: yourdockerhubusername/technoladders-website:latest # Use your Docker Hub username

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create the directory if it doesn't exist
            mkdir -p /home/deploy/apps/technoladders-website

            # Create the docker-compose.yml file
            echo "services:
              technoladders-website:
                image: yourdockerhubusername/technoladders-website:latest
                container_name: technoladders-website
                restart: unless-stopped
                ports:
                  - '5025:80' # Use a new, unique port
                networks:
                  - zivelogin-network-prod
            networks:
              zivelogin-network-prod:
                external: true" > /home/deploy/apps/technoladders-website/docker-compose.yml

            # Navigate to the directory and deploy
            cd /home/deploy/apps/technoladders-website
            docker pull yourdockerhubusername/technoladders-website:latest
            docker compose up -d